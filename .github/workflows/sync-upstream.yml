name: 从上游同步 xiaosa

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"   # 北京时间 06:20 运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 使用 git clone 完整拉取上游
        run: |
          git clone --depth 1 --branch master https://github.com/qist/tvbox.git ./upstream_temp

      - name: 确认 xiaosa 目录存在
        run: |
          if [ -d "./upstream_temp/xiaosa" ]; then
            echo "✅ xiaosa 目录存在"
          else
            echo "❌ xiaosa 目录不存在"
            exit 1
          fi

      - name: 复制文件到我的仓库
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' -exec rm -rf {} +
          cp -r ./upstream_temp/xiaosa/* .
          cp -r ./upstream_temp/xiaosa/.[!.]* . 2>/dev/null || true
          rm -rf ./upstream_temp
          ls -la

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有变化"
          else
            git commit -m "🔄 同步上游 xiaosa $(date '+%Y-%m-%d %H:%M')"
            git push origin master
          fi
