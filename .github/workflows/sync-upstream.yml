name: 从上游同步 xiaosa

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 完整拉取上游仓库
        run: |
          rm -rf ./upstream_temp
          git clone --depth 1 --branch master https://github.com/qist/tvbox.git ./upstream_temp

      - name: 同步文件
        run: |
          # 先复制，再清空当前目录（调整顺序）
          # 将上游 xiaosa 内容先复制到一个临时目录
          mkdir -p ./new_content
          cp -r ./upstream_temp/xiaosa/. ./new_content/
          
          # 清空当前目录（保留 .git）
          find . -maxdepth 1 ! -name '.' ! -name '.git' -exec rm -rf {} +
          
          # 将新内容复制回来
          cp -r ./new_content/. .
          
          # 清理
          rm -rf ./upstream_temp ./new_content
          
          echo "✅ 同步完成"
          ls -la

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有变化"
          else
            git commit -m "🔄 同步上游 xiaosa $(date '+%Y-%m-%d %H:%M')"
            git push origin master
          fi