name: 从上游同步 xiaosa

on:
  schedule:
    - cron: "20 6 * * *"   # 每天 UTC 06:20 (北京时间 06:20)
  workflow_dispatch:        # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出你自己的仓库
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 检出上游 qist/tvbox 仓库 (master 分支)
      - name: 检出上游仓库
        uses: actions/checkout@v4
        with:
          repository: qist/tvbox
          ref: master          # 明确使用 master 分支
          path: ./upstream_temp

      # 3. 同步文件 (修正后的复制命令)
      - name: 复制上游 xiaosa 目录内容
        run: |
          # 删除你仓库当前所有内容（保留 .git 和 .github 隐藏目录）
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' -exec rm -rf {} +
          
          # 复制上游 xiaosa 目录下的全部内容到当前根目录
          # 关键修正：使用 . 代替 * 来包含隐藏文件
          cp -r ./upstream_temp/xiaosa/. .
          
          # 清理临时目录
          rm -rf ./upstream_temp
          
          # 验证结果
          echo "✅ 同步完成，当前目录内容："
          ls -la

      # 4. 提交并推送更新
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有新变化，无需提交"
          else
            git commit -m "🔄 自动同步上游 xiaosa $(date '+%Y-%m-%d %H:%M')"
            git push origin master
          fi
