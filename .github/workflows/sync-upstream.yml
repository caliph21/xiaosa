name: 从上游同步 xiaosa

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 完整拉取上游仓库
        run: |
          # 删除可能存在的旧目录
          rm -rf ./upstream_temp
          # 完整克隆（不使用 depth）
          git clone https://github.com/qist/tvbox.git ./upstream_temp
          cd ./upstream_temp
          git checkout master
          cd ..

      - name: 确认并复制文件
        run: |
          echo "=== xiaosa 目录内容 ==="
          ls -la ./upstream_temp/xiaosa/
          
          # 清空当前目录（保留 .git）
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' -exec rm -rf {} +
          
          # 复制 xiaosa 目录下所有内容
          cp -r ./upstream_temp/xiaosa/* .
          cp -r ./upstream_temp/xiaosa/.[!.]* . 2>/dev/null || true
          
          # 清理
          rm -rf ./upstream_temp
          
          echo "=== 同步完成 ==="
          ls -la

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有变化"
          else
            git commit -m "🔄 同步上游 xiaosa $(date '+%Y-%m-%d %H:%M')"
            git push origin master
          fi
