name: 从上游同步 xiaosa

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"   # UTC 22:20 = 北京时间 06:20

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 完整拉取上游仓库
        run: |
          rm -rf ./upstream_temp
          git clone https://github.com/qist/tvbox.git ./upstream_temp
          cd ./upstream_temp
          git checkout master
          cd ..

      - name: 复制文件（使用 rsync）
        run: |
          # 清空当前目录（保留 .git 和 .github）
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' -exec rm -rf {} +
          
          # 使用 rsync 复制
          rsync -av --delete ./upstream_temp/xiaosa/ .
          
          # 清理
          rm -rf ./upstream_temp
          
          echo "=== 同步完成 ==="
          ls -la

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有变化"
          else
            git commit -m "🔄 同步上游 xiaosa $(date '+%Y-%m-%d %H:%M')"
            git push origin master
          fi
