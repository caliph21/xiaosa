name: Merge JAR Files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  merge-jars:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: caliph21/xiaosa
        path: xiaosa
        
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Merge and replace
      run: |
        cd xiaosa
        
        # 解压 spider.jar (路径: xiaosa/xiaosa/spider.jar)
        mkdir -p temp
        cd temp
        jar xf ../xiaosa/spider.jar
        
        # 将 com/github/catvod/spider 添加到 BXS.jar (路径: xiaosa/BXS.jar)
        cd ..
        jar uf BXS.jar -C temp com/github/catvod/spider
        
        # 清理
        rm -rf temp
        
        # 替换 spider.jar
        mv xiaosa/spider.jar xiaosa/spider-backup.jar
        cp BXS.jar xiaosa/spider.jar
        
    - name: Commit
      run: |
        cd xiaosa
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add xiaosa/spider.jar
        git commit -m "Update spider.jar" || echo "No changes"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
