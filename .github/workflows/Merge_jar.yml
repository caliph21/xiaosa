name: Merge JAR Files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  merge-jars:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: caliph21/xiaosa
        path: xiaosa
        
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Debug - Show directory structure
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        
        echo "=== xiaosa directory ==="
        ls -la xiaosa/
        
        echo "=== Looking for JAR files ==="
        find . -name "*.jar" -type f
        
    - name: Extract from spider.jar and merge to BXS.jar
      run: |
        # 进入仓库根目录
        cd xiaosa
        
        echo "Working in: $(pwd)"
        
        # spider.jar 在 xiaosa/xiaosa/ 目录下
        SPIDER_PATH="xiaosa/spider.jar"
        BXS_PATH="BXS.jar"
        
        # 检查文件
        if [ ! -f "$SPIDER_PATH" ]; then
          echo "❌ ERROR: $SPIDER_PATH not found!"
          echo "Current files:"
          find . -name "*.jar" -type f
          exit 1
        fi
        
        if [ ! -f "$BXS_PATH" ]; then
          echo "❌ ERROR: $BXS_PATH not found!"
          exit 1
        fi
        
        echo "✅ Found spider.jar at: $SPIDER_PATH"
        echo "✅ Found BXS.jar at: $BXS_PATH"
        
        # 创建临时目录
        mkdir -p temp/spider_extract
        
        # 进入临时目录解压 spider.jar
        cd temp/spider_extract
        jar xf "../../$SPIDER_PATH"
        
        # 检查 com.github.catvod
        if [ -d "com/github/catvod" ]; then
          echo "✅ Found com/github/catvod in spider.jar"
        else
          echo "❌ ERROR: com/github/catvod not found"
          exit 1
        fi
        
        # 回到根目录
        cd ../..
        
        # 将 com.github.catvod 添加到 BXS.jar
        echo "Adding com/github/catvod to BXS.jar..."
        jar uf "$BXS_PATH" -C temp/spider_extract com/github/catvod
        
        # 清理
        rm -rf temp
        
        echo "✅ Merge completed"
        
    - name: Replace spider.jar with BXS.jar
      run: |
        cd xiaosa
        
        SPIDER_PATH="xiaosa/spider.jar"
        BXS_PATH="BXS.jar"
        
        # 备份原 spider.jar
        mv "$SPIDER_PATH" "${SPIDER_PATH}.backup"
        
        # 用 BXS.jar 替换
        cp "$BXS_PATH" "$SPIDER_PATH"
        
        echo "✅ Replaced spider.jar with BXS.jar"
        ls -la xiaosa/*.jar
        ls -la *.jar
        
    - name: Commit changes
      run: |
        cd xiaosa
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add xiaosa/spider.jar
        git status
        git commit -m "Update spider.jar with merged BXS.jar content" || echo "No changes"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
